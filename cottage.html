<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxel Cottage - Three.js</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #b9d8ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
    }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: #1d2a32;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 16px;
      padding: 12px 14px;
      max-width: 320px;
      box-shadow: 0 12px 30px rgba(38, 65, 91, 0.14);
      user-select: none;
    }

    .hud h1 {
      margin: 0 0 5px;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .hud p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
      color: #40505d;
    }

    .controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      background: #25384a;
      color: white;
      padding: 7px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 650;
      font-size: 12px;
    }

    button:hover { background: #385574; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <h1>Voxel Cottage</h1>
    <p>Drag to orbit, wheel to zoom, right-drag to pan. Built from cube voxels with generated canvas textures.</p>
    <div class="controls">
      <button id="toggleGrid">Toggle Grid</button>
      <button id="toggleExplode">Exploded View</button>
      <button id="resetCam">Reset Camera</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xb9d8ff);
    scene.fog = new THREE.Fog(0xb9d8ff, 38, 82);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(18, 14, 22);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.target.set(0, 3, 0);
    controls.minDistance = 8;
    controls.maxDistance = 55;
    controls.maxPolarAngle = Math.PI * 0.48;

    // ---------- Procedural textures ----------
    function makeCanvasTexture(draw, size = 128) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      draw(ctx, size);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.magFilter = THREE.NearestFilter;
      tex.minFilter = THREE.NearestMipmapNearestFilter;
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    function noise(ctx, size, alpha = 0.18) {
      const image = ctx.getImageData(0, 0, size, size);
      for (let i = 0; i < image.data.length; i += 4) {
        const n = Math.floor((Math.random() - 0.5) * 80);
        image.data[i] = Math.max(0, Math.min(255, image.data[i] + n));
        image.data[i + 1] = Math.max(0, Math.min(255, image.data[i + 1] + n));
        image.data[i + 2] = Math.max(0, Math.min(255, image.data[i + 2] + n));
        image.data[i + 3] = Math.floor(255 * alpha);
      }
      ctx.putImageData(image, 0, 0);
    }

    const wallTex = makeCanvasTexture((ctx, s) => {
      ctx.fillStyle = '#d8b072';
      ctx.fillRect(0, 0, s, s);
      ctx.fillStyle = '#c9975d';
      for (let y = 0; y < s; y += 18) {
        ctx.fillRect(0, y, s, 2);
      }
      for (let y = 0; y < s; y += 36) {
        for (let x = 0; x < s; x += 32) ctx.fillRect(x + (y % 72 ? 16 : 0), y, 2, 18);
      }
      noise(ctx, s, 0.16);
    });

    const roofTex = makeCanvasTexture((ctx, s) => {
      ctx.fillStyle = '#9f3e32';
      ctx.fillRect(0, 0, s, s);
      for (let y = 0; y < s; y += 14) {
        ctx.fillStyle = y % 28 === 0 ? '#7d2d28' : '#b74b3a';
        ctx.fillRect(0, y, s, 8);
        ctx.fillStyle = 'rgba(255,255,255,0.09)';
        ctx.fillRect(0, y, s, 1);
      }
      noise(ctx, s, 0.15);
    });

    const woodTex = makeCanvasTexture((ctx, s) => {
      ctx.fillStyle = '#7b4b2a';
      ctx.fillRect(0, 0, s, s);
      for (let x = 0; x < s; x += 9) {
        ctx.strokeStyle = x % 18 === 0 ? '#5c361d' : '#98603a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.bezierCurveTo(x + 4, s * 0.25, x - 3, s * 0.65, x + 2, s);
        ctx.stroke();
      }
      noise(ctx, s, 0.12);
    });

    const grassTex = makeCanvasTexture((ctx, s) => {
      ctx.fillStyle = '#75b84b';
      ctx.fillRect(0, 0, s, s);
      for (let i = 0; i < 850; i++) {
        const x = Math.random() * s;
        const y = Math.random() * s;
        const h = 2 + Math.random() * 8;
        ctx.strokeStyle = Math.random() > 0.5 ? '#5da23d' : '#8ccc5d';
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.random() * 3 - 1.5, y - h);
        ctx.stroke();
      }
    });
    grassTex.repeat.set(16, 16);

    const stoneTex = makeCanvasTexture((ctx, s) => {
      ctx.fillStyle = '#8b8d88';
      ctx.fillRect(0, 0, s, s);
      for (let i = 0; i < 35; i++) {
        ctx.fillStyle = `rgba(${110 + Math.random()*50}, ${112 + Math.random()*45}, ${110 + Math.random()*45}, 0.5)`;
        ctx.beginPath();
        ctx.ellipse(Math.random()*s, Math.random()*s, 5+Math.random()*18, 3+Math.random()*14, Math.random()*Math.PI, 0, Math.PI*2);
        ctx.fill();
      }
      noise(ctx, s, 0.11);
    });

    const glassTex = makeCanvasTexture((ctx, s) => {
      const g = ctx.createLinearGradient(0, 0, s, s);
      g.addColorStop(0, '#9fe3ff');
      g.addColorStop(1, '#417fa8');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, s, s);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillRect(12, 10, 16, 50);
      ctx.fillRect(34, 10, 6, 50);
      ctx.fillStyle = 'rgba(20,42,70,0.22)';
      ctx.fillRect(0, s/2 - 3, s, 6);
      ctx.fillRect(s/2 - 3, 0, 6, s);
    });

    const mat = {
      wall: new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.82 }),
      roof: new THREE.MeshStandardMaterial({ map: roofTex, roughness: 0.74 }),
      wood: new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.68 }),
      grass: new THREE.MeshStandardMaterial({ map: grassTex, roughness: 0.95 }),
      stone: new THREE.MeshStandardMaterial({ map: stoneTex, roughness: 0.9 }),
      glass: new THREE.MeshStandardMaterial({ map: glassTex, roughness: 0.28, metalness: 0.02 }),
      chimney: new THREE.MeshStandardMaterial({ color: 0x6c5d56, roughness: 0.9 }),
      trim: new THREE.MeshStandardMaterial({ color: 0xf2dfba, roughness: 0.72 }),
      flowerRed: new THREE.MeshStandardMaterial({ color: 0xe85151, roughness: 0.72 }),
      flowerYellow: new THREE.MeshStandardMaterial({ color: 0xffd05a, roughness: 0.72 }),
      leaf: new THREE.MeshStandardMaterial({ color: 0x2f8f42, roughness: 0.9 })
    };

    // ---------- Voxel helpers ----------
    const voxelGroup = new THREE.Group();
    scene.add(voxelGroup);

    const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
    const voxels = [];

    function addVoxel(x, y, z, material, sx = 1, sy = 1, sz = 1, group = voxelGroup) {
      const mesh = new THREE.Mesh(cubeGeo, material);
      mesh.position.set(x, y, z);
      mesh.scale.set(sx, sy, sz);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.home = mesh.position.clone();
      group.add(mesh);
      voxels.push(mesh);
      return mesh;
    }

    function addBoxVoxels(minX, maxX, minY, maxY, minZ, maxZ, material, skip = () => false) {
      for (let x = minX; x <= maxX; x++) {
        for (let y = minY; y <= maxY; y++) {
          for (let z = minZ; z <= maxZ; z++) {
            if (!skip(x, y, z)) addVoxel(x, y, z, material);
          }
        }
      }
    }

    // ---------- Ground ----------
    const ground = new THREE.Mesh(new THREE.BoxGeometry(34, 1, 34), mat.grass);
    ground.position.y = -0.55;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(34, 34, 0x5f8f57, 0x8cc472);
    grid.position.y = 0.02;
    grid.material.opacity = 0.25;
    grid.material.transparent = true;
    scene.add(grid);

    // ---------- Cottage body ----------
    // Stone base
    addBoxVoxels(-5, 5, 0, 0, -4, 4, mat.stone);

    // Main wall block with gaps for windows/door
    addBoxVoxels(-5, 5, 1, 5, -4, 4, mat.wall, (x, y, z) => {
      // hollow-ish interior avoided by only creating shell
      const shell = x === -5 || x === 5 || z === -4 || z === 4 || y === 5;
      if (!shell) return true;
      // front door opening
      if (z === 4 && x >= -1 && x <= 1 && y >= 1 && y <= 3) return true;
      // front windows
      if (z === 4 && ((x >= -4 && x <= -3) || (x >= 3 && x <= 4)) && y >= 3 && y <= 4) return true;
      // side windows
      if ((x === -5 || x === 5) && z >= -1 && z <= 1 && y >= 3 && y <= 4) return true;
      return false;
    });

    // Door and windows
    addVoxel(0, 1.5, 4.05, mat.wood, 2.05, 3.05, 0.22);
    addVoxel(0.65, 2.15, 4.19, mat.trim, 0.14, 0.14, 0.1);

    for (const x of [-3.5, 3.5]) {
      addVoxel(x, 3.5, 4.08, mat.glass, 1.85, 1.85, 0.2);
      addVoxel(x, 3.5, 4.22, mat.trim, 2.15, 0.18, 0.22);
      addVoxel(x, 3.5, 4.23, mat.trim, 0.18, 2.15, 0.22);
    }
    for (const x of [-5.08, 5.08]) {
      addVoxel(x, 3.5, 0, mat.glass, 0.22, 1.85, 1.85);
      addVoxel(x, 3.5, 0, mat.trim, 0.26, 0.18, 2.15);
      addVoxel(x, 3.5, 0, mat.trim, 0.26, 2.15, 0.18);
    }

    // Timber beams / cottage trim
    for (let x = -5; x <= 5; x += 5) {
      addVoxel(x, 3, 4.15, mat.wood, 0.25, 5.2, 0.25);
      addVoxel(x, 3, -4.15, mat.wood, 0.25, 5.2, 0.25);
    }
    addVoxel(0, 5.55, 4.15, mat.wood, 11.3, 0.26, 0.26);
    addVoxel(0, 5.55, -4.15, mat.wood, 11.3, 0.26, 0.26);
    addVoxel(-5.15, 5.55, 0, mat.wood, 0.26, 0.26, 8.3);
    addVoxel(5.15, 5.55, 0, mat.wood, 0.26, 0.26, 8.3);

    // ---------- Stepped voxel roof ----------
    const roofLevels = [
      { y: 6, half: 7, depth: 6 },
      { y: 7, half: 6, depth: 5 },
      { y: 8, half: 5, depth: 4 },
      { y: 9, half: 4, depth: 3 },
      { y: 10, half: 3, depth: 2 },
      { y: 11, half: 2, depth: 1 },
      { y: 12, half: 1, depth: 0 }
    ];
    for (const r of roofLevels) {
      for (let x = -r.half; x <= r.half; x++) {
        for (let z = -r.depth; z <= r.depth; z++) {
          addVoxel(x, r.y, z, mat.roof);
        }
      }
    }
    // roof ridge cap
    addVoxel(0, 12.65, 0, mat.wood, 2.4, 0.35, 1.1);

    // Gable faces
    for (let y = 6; y <= 10; y++) {
      const w = 10 - y;
      for (let x = -w; x <= w; x++) {
        addVoxel(x, y, 4.08, mat.wall, 1, 1, 0.25);
        addVoxel(x, y, -4.08, mat.wall, 1, 1, 0.25);
      }
    }

    // Chimney
    addVoxel(3, 12, -1, mat.chimney, 1.3, 1, 1.3);
    addVoxel(3, 13, -1, mat.chimney, 1.3, 1, 1.3);
    addVoxel(3, 14, -1, mat.chimney, 1.3, 1, 1.3);
    addVoxel(3, 14.7, -1, mat.chimney, 1.75, 0.35, 1.75);

    // Path stones
    const pathPositions = [[0,5.8],[0,7.1],[-0.3,8.5],[0.4,9.9],[-0.2,11.3]];
    pathPositions.forEach(([x,z], i) => addVoxel(x, 0.08, z, mat.stone, 1.5 + (i%2)*0.3, 0.18, 1.0 + (i%3)*0.2));

    // Fence
    for (let x = -12; x <= 12; x += 2) {
      addVoxel(x, 1, 10.5, mat.wood, 0.35, 2, 0.35);
      addVoxel(x, 1, -10.5, mat.wood, 0.35, 2, 0.35);
    }
    addVoxel(0, 1.35, 10.5, mat.wood, 24.5, 0.28, 0.28);
    addVoxel(0, 0.65, 10.5, mat.wood, 24.5, 0.28, 0.28);
    addVoxel(0, 1.35, -10.5, mat.wood, 24.5, 0.28, 0.28);
    addVoxel(0, 0.65, -10.5, mat.wood, 24.5, 0.28, 0.28);

    // Flowers / shrubs
    for (let i = 0; i < 55; i++) {
      const side = Math.random() > 0.5 ? -1 : 1;
      const x = side * (6.5 + Math.random() * 4.6);
      const z = -3 + Math.random() * 10;
      addVoxel(x, 0.45, z, mat.leaf, 0.55, 0.55, 0.55);
      if (Math.random() > 0.55) addVoxel(x, 0.9, z, Math.random() > 0.5 ? mat.flowerRed : mat.flowerYellow, 0.32, 0.32, 0.32);
    }

    // Tiny voxel tree
    function addTree(cx, cz) {
      addVoxel(cx, 1.2, cz, mat.wood, 0.8, 2.4, 0.8);
      for (let y = 3; y <= 5; y++) {
        const rad = 6 - y;
        for (let x = -rad; x <= rad; x++) {
          for (let z = -rad; z <= rad; z++) {
            if (Math.abs(x) + Math.abs(z) <= rad + 0.5) {
              addVoxel(cx + x * 0.8, y, cz + z * 0.8, mat.leaf, 0.82, 0.82, 0.82);
            }
          }
        }
      }
    }
    addTree(-12, -5.5);
    addTree(12, -7.5);

    // ---------- Lighting ----------
    const hemi = new THREE.HemisphereLight(0xeef7ff, 0x6b824b, 1.55);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xfff0cf, 3.2);
    sun.position.set(12, 20, 9);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -28;
    sun.shadow.camera.right = 28;
    sun.shadow.camera.top = 28;
    sun.shadow.camera.bottom = -28;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 60;
    scene.add(sun);

    const fill = new THREE.DirectionalLight(0x9fcaff, 0.6);
    fill.position.set(-10, 9, -12);
    scene.add(fill);

    // ---------- Soft cloud voxels ----------
    const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
    const cloudGroup = new THREE.Group();
    scene.add(cloudGroup);
    function addCloud(x, y, z) {
      const parts = [
        [0,0,0,2,1,1], [1.4,0.15,0,2.3,1.2,1.1], [-1.4,0.05,0,1.6,0.9,0.9],
        [0.5,0.65,0,1.5,1.1,1], [2.4,0,0,1.3,0.8,0.8]
      ];
      for (const p of parts) addVoxel(x+p[0], y+p[1], z+p[2], cloudMat, p[3], p[4], p[5], cloudGroup);
    }
    addCloud(-13, 17, -18);
    addCloud(11, 19, -14);
    addCloud(3, 21, -23);

    // ---------- Interactions ----------
    let exploded = false;
    document.getElementById('toggleGrid').onclick = () => grid.visible = !grid.visible;
    document.getElementById('resetCam').onclick = () => {
      camera.position.set(18, 14, 22);
      controls.target.set(0, 3, 0);
      controls.update();
    };
    document.getElementById('toggleExplode').onclick = () => {
      exploded = !exploded;
    };

    function animateExplode() {
      for (const v of voxels) {
        const h = v.userData.home;
        if (!h) continue;
        const dir = h.clone().sub(new THREE.Vector3(0, 4, 0));
        if (dir.lengthSq() > 0.001) dir.normalize();
        const target = exploded ? h.clone().add(dir.multiplyScalar(0.45 + h.y * 0.055)) : h;
        v.position.lerp(target, 0.085);
      }
    }

    // ---------- Render loop ----------
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      cloudGroup.position.x = Math.sin(t * 0.04) * 1.2;
      animateExplode();
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
